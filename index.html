<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Explorer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

#gameContainer{
    width:min(100vw, calc(100vh * 16 / 9));
    aspect-ratio:16/9;
    position:relative;
    overflow:hidden;
    border:3px solid #333;
    background:black;
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:8px;
    z-index:10;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    color:white;
    font-size:26px;
    pointer-events:none;
    z-index:20;
}
</style>
</head>

<body>

<div id="gameContainer">

    <div id="ui">
        W A S D = 移動<br>
        ← → ↑ ↓ = 視点移動<br>
        E = ブロック破壊 / 鉱石採掘
    </div>

    <div id="crosshair">+</div>

</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

const container = document.getElementById("gameContainer");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    container.clientWidth,
    container.clientHeight
);

container.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(
    75,
    container.clientWidth / container.clientHeight,
    0.1,
    1000
);

camera.position.set(0,2,5);

// 光
const ambientLight = new THREE.AmbientLight(0xffffff,0.8);
scene.add(ambientLight);

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

// 保存用
const breakableObjects = [];
const oreObjects = [];

// 地面ブロック
const blockGeo = new THREE.BoxGeometry(1,1,1);

for(let x=-20;x<=20;x++){
    for(let z=-20;z<=20;z++){

        const block = new THREE.Mesh(
            blockGeo,
            new THREE.MeshLambertMaterial({
                color:(x+z)%2===0
                    ? 0x4CAF50
                    : 0x3F9B45
            })
        );

        block.position.set(x,0,z);
        block.userData.type = "block";

        scene.add(block);
        breakableObjects.push(block);
    }
}

// 鉱石
for(let i=0;i<20;i++){

    const ore = new THREE.Mesh(
        blockGeo,
        new THREE.MeshLambertMaterial({
            color:0x00FFFF
        })
    );

    ore.position.set(
        Math.random()*30-15,
        1,
        Math.random()*30-15
    );

    ore.userData.type = "ore";

    scene.add(ore);
    breakableObjects.push(ore);
    oreObjects.push(ore);
}

// キー入力
const keys = {};

window.addEventListener("keydown",(e)=>{
    keys[e.key] = true;
});

window.addEventListener("keyup",(e)=>{
    keys[e.key] = false;
});

// 視点
let yaw = 0;
let pitch = 0;

function updateCameraRotation(){

    const speed = 0.02;

    if(keys["ArrowLeft"]){
        yaw += speed;
    }

    if(keys["ArrowRight"]){
        yaw -= speed;
    }

    if(keys["ArrowUp"]){
        pitch += speed;
    }

    if(keys["ArrowDown"]){
        pitch -= speed;
    }

    pitch = Math.max(
        -1.4,
        Math.min(1.4,pitch)
    );

    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
}

// 移動
function movePlayer(){

    const speed = 0.12;

    const forward = new THREE.Vector3(
        Math.sin(yaw),
        0,
        Math.cos(yaw)
    );

    const right = new THREE.Vector3(
        Math.cos(yaw),
        0,
        -Math.sin(yaw)
    );

    // W/S 修正済み
    if(keys["w"] || keys["W"]){
        camera.position.addScaledVector(
            forward,
            -speed
        );
    }

    if(keys["s"] || keys["S"]){
        camera.position.addScaledVector(
            forward,
            speed
        );
    }

    if(keys["a"] || keys["A"]){
        camera.position.addScaledVector(
            right,
            -speed
        );
    }

    if(keys["d"] || keys["D"]){
        camera.position.addScaledVector(
            right,
            speed
        );
    }

    camera.position.y = 2;
}

// レイキャスト
const raycaster = new THREE.Raycaster();

// Eキーで破壊
window.addEventListener("keydown",(e)=>{

    if(e.key !== "e" && e.key !== "E"){
        return;
    }

    raycaster.setFromCamera(
        new THREE.Vector2(0,0),
        camera
    );

    const hit = raycaster.intersectObjects(
        breakableObjects
    );

    if(hit.length > 0){

        const target = hit[0].object;

        if(hit[0].distance < 6){

            if(target.userData.type === "ore"){
                console.log("鉱石採掘！");
            }

            if(target.userData.type === "block"){
                console.log("ブロック破壊！");
            }

            scene.remove(target);

            const index =
                breakableObjects.indexOf(target);

            if(index !== -1){
                breakableObjects.splice(index,1);
            }
        }
    }
});

// リサイズ
function resize(){

    const w = container.clientWidth;
    const h = container.clientHeight;

    renderer.setSize(w,h);

    camera.aspect = w/h;
    camera.updateProjectionMatrix();
}

window.addEventListener("resize",resize);

// メインループ
function animate(){

    requestAnimationFrame(animate);

    updateCameraRotation();
    movePlayer();

    renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
