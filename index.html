<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Science Explorer</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#111;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}
#game{
    width:min(100vw,calc(100vh * 16 / 9));
    aspect-ratio:16/9;
    position:relative;
    overflow:hidden;
    border:4px solid #333;
    background:#000;
}
canvas{width:100%;height:100%;display:block}

/* UI */
#help{
    position:absolute;
    top:12px;left:12px;
    color:#fff;
    background:#0008;
    padding:10px 14px;
    border:2px solid #444;
    z-index:10;
    line-height:1.5;
    font-size:14px;
}

#crosshair{
    position:absolute;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    color:#fff;
    font-size:18px;
    z-index:20;
    pointer-events:none;
}

/* 採掘リング */
#ring{
    position:absolute;
    left:50%;top:50%;
    width:70px;height:70px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    z-index:19;
    display:none;
    pointer-events:none;
}

#targetInfo{
    position:absolute;
    left:50%;
    top:calc(50% + 45px);
    transform:translateX(-50%);
    color:#fff;
    background:#0008;
    border:2px solid #444;
    padding:6px 10px;
    border-radius:6px;
    font-size:14px;
    display:none;
    z-index:20;
}

/* ホットバー */
#hotbar{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:4px;
    z-index:20;
}
.slot{
    width:58px;
    height:58px;
    background:#444c;
    border:3px solid #666;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:12px;
    position:relative;
}
.slot span{
    position:absolute;
    right:4px;
    bottom:2px;
    font-size:12px;
}

/* inventory */
#inventory{
    position:absolute;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:70%;
    background:#111f;
    border:4px solid #666;
    padding:20px;
    display:none;
    z-index:50;
}
#inventory h2{
    color:white;
    text-align:center;
    margin-bottom:16px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}
.item{
    height:90px;
    background:#333;
    border:2px solid #777;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<div id="game">

    <div id="help">
        WASD = 移動<br>
        ←↑→↓ = 視点<br>
        R長押し = 採掘<br>
        E = インベントリ
    </div>

    <div id="crosshair">+</div>
    <div id="ring"></div>
    <div id="targetInfo"></div>

    <div id="hotbar"></div>

    <div id="inventory">
        <h2>インベントリ</h2>
        <div class="grid" id="inventoryGrid"></div>
    </div>

</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

const game=document.getElementById("game");
const ring=document.getElementById("ring");
const info=document.getElementById("targetInfo");
const hotbar=document.getElementById("hotbar");
const inventoryUI=document.getElementById("inventory");
const inventoryGrid=document.getElementById("inventoryGrid");

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(game.clientWidth,game.clientHeight);
game.appendChild(renderer.domElement);

const camera=new THREE.PerspectiveCamera(
75,
game.clientWidth/game.clientHeight,
0.1,
1000
);
camera.position.set(0,2,5);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

const geo=new THREE.BoxGeometry(1,1,1);
const objects=[];

const ores=[
{name:"石",key:"stone",color:0x777777,time:400},
{name:"石炭",key:"coal",color:0x222222,time:700},
{name:"銅",key:"copper",color:0xb87333,time:1200},
{name:"鉄",key:"iron",color:0xc0c0c0,time:1800},
{name:"金",key:"gold",color:0xffd700,time:2400},
{name:"ダイヤ",key:"diamond",color:0x00e5ff,time:3400},
{name:"科学鉱石",key:"science",color:0x00ffff,time:4500}
];

const inventory={};
ores.forEach(o=>inventory[o.key]=0);

function updateUI(){

    hotbar.innerHTML="";
    inventoryGrid.innerHTML="";

    ores.forEach(o=>{
        const count=inventory[o.key];

        const slot=document.createElement("div");
        slot.className="slot";
        slot.innerHTML=`${o.name}<span>${count}</span>`;
        hotbar.appendChild(slot);

        const item=document.createElement("div");
        item.className="item";
        item.textContent=`${o.name} ×${count}`;
        inventoryGrid.appendChild(item);
    });
}

function block(x,y,z,color,type,time,name){
    const mesh=new THREE.Mesh(
        geo,
        new THREE.MeshLambertMaterial({color})
    );

    mesh.position.set(x,y,z);
    mesh.userData={type,time,name};

    scene.add(mesh);
    objects.push(mesh);
}

// ground
for(let x=-20;x<=20;x++){
    for(let z=-20;z<=20;z++){
        block(
            x,0,z,
            (x+z)%2?0x4CAF50:0x3F9B45,
            "stone",400,"石"
        );
    }
}

// ores
function spawn(key,count){
    const o=ores.find(v=>v.key===key);
    for(let i=0;i<count;i++){
        block(
            Math.random()*36-18,
            1,
            Math.random()*36-18,
            o.color,o.key,o.time,o.name
        );
    }
}
spawn("coal",18);
spawn("copper",14);
spawn("iron",12);
spawn("gold",8);
spawn("diamond",6);
spawn("science",5);

const keys={};
window.addEventListener("keydown",e=>{
    keys[e.key]=true;

    if(e.key==="e"||e.key==="E"){
        inventoryUI.style.display=
        inventoryUI.style.display==="block"
        ?"none":"block";
    }
});
window.addEventListener("keyup",e=>{
    keys[e.key]=false;
});

let yaw=0,pitch=0;

function look(){
    const s=0.02;

    if(keys["ArrowLeft"]) yaw+=s;
    if(keys["ArrowRight"]) yaw-=s;
    if(keys["ArrowUp"]) pitch+=s;
    if(keys["ArrowDown"]) pitch-=s;

    pitch=Math.max(-1.3,Math.min(1.3,pitch));

    camera.rotation.order="YXZ";
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;
}

function move(){

    if(inventoryUI.style.display==="block")
    return;

    const speed=0.12;

    const forward=
    new THREE.Vector3(
        Math.sin(yaw),0,Math.cos(yaw)
    );

    const right=
    new THREE.Vector3(
        Math.cos(yaw),0,-Math.sin(yaw)
    );

    if(keys.w||keys.W)
        camera.position.addScaledVector(forward,-speed);

    if(keys.s||keys.S)
        camera.position.addScaledVector(forward,speed);

    if(keys.a||keys.A)
        camera.position.addScaledVector(right,-speed);

    if(keys.d||keys.D)
        camera.position.addScaledVector(right,speed);

    camera.position.y=2;
}

const raycaster=new THREE.Raycaster();

let miningTarget=null;
let startTime=0;

function mining(){

    raycaster.setFromCamera(
        new THREE.Vector2(0,0),
        camera
    );

    const hit=
    raycaster.intersectObjects(objects);

    if(hit.length===0||hit[0].distance>6){
        ring.style.display="none";
        info.style.display="none";
        miningTarget=null;
        return;
    }

    const target=hit[0].object;

    info.style.display="block";
    info.innerHTML=
    `${target.userData.name}<br>
    採掘 ${(target.userData.time/1000).toFixed(1)}秒`;

    if(!(keys.r||keys.R)){
        ring.style.display="none";
        miningTarget=null;
        return;
    }

    if(miningTarget!==target){
        miningTarget=target;
        startTime=performance.now();
    }

    const progress=
    (performance.now()-startTime)
    /target.userData.time;

    ring.style.display="block";
    ring.style.background=
    `conic-gradient(
        #ffffff ${progress*360}deg,
        rgba(255,255,255,.15) 0deg
    )`;

    if(progress>=1){

        inventory[target.userData.type]++;
        updateUI();

        scene.remove(target);
        objects.splice(
            objects.indexOf(target),1
        );

        miningTarget=null;
        ring.style.display="none";
    }
}

window.addEventListener("resize",()=>{
    renderer.setSize(
        game.clientWidth,
        game.clientHeight
    );
    camera.aspect=
    game.clientWidth/game.clientHeight;
    camera.updateProjectionMatrix();
});

function animate(){
    requestAnimationFrame(animate);
    look();
    move();
    mining();
    renderer.render(scene,camera);
}

updateUI();
animate();

</script>
</body>
</html>
