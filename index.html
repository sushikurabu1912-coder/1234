<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumCraft</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#0f172a;
    font-family:sans-serif;
    color:white;
}

canvas{
    display:block;
    background:#1e293b;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:rgba(0,0,0,0.65);
    padding:14px;
    border-radius:12px;
    width:260px;
}

.bar{
    margin:6px 0;
}

.help{
    margin-top:12px;
    font-size:13px;
    color:#cbd5e1;
    line-height:1.6;
}

hr{
    border:1px solid #334155;
    margin:12px 0;
}

</style>
</head>
<body>

<div id="ui">

    <h2>QuantumCraft</h2>

    <div class="bar">⛓ 鉄: <span id="iron">0</span></div>
    <div class="bar">🪨 石炭: <span id="coal">0</span></div>
    <div class="bar">🔥 熱: <span id="heat">0</span></div>
    <div class="bar">⚡ 電力: <span id="power">0</span></div>
    <div class="bar">🧪 科学: <span id="science">0</span></div>

    <hr>

    <div class="bar">🏭 かまど: <span id="furnace">0</span></div>
    <div class="bar">⚙ 発電機: <span id="generator">0</span></div>

    <div class="help">

        WASD : 移動<br>
        SPACE : 採掘<br><br>

        C : かまど作成<br>
        G : 発電機作成<br>
        B : かまど使用<br>
        F : 発電<br>
        R : 研究

    </div>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

});

const TILE = 32;
const MAP_W = 100;
const MAP_H = 100;

const map = [];

for(let y=0;y<MAP_H;y++){

    const row = [];

    for(let x=0;x<MAP_W;x++){

        let type = "grass";

        const r = Math.random();

        if(r < 0.08){
            type = "iron";
        }
        else if(r < 0.15){
            type = "coal";
        }

        row.push(type);
    }

    map.push(row);
}

const player = {

    x:10,
    y:10,
    speed:0.12

};

const state = {

    iron:0,
    coal:0,
    heat:0,
    power:0,
    science:0,

    furnace:0,
    generator:0

};

const keys = {};

window.addEventListener("keydown",(e)=>{
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup",(e)=>{
    keys[e.key.toLowerCase()] = false;
});

function updateUI(){

    document.getElementById("iron").textContent = state.iron;
    document.getElementById("coal").textContent = state.coal;
    document.getElementById("heat").textContent = state.heat;
    document.getElementById("power").textContent = state.power;
    document.getElementById("science").textContent = state.science;

    document.getElementById("furnace").textContent = state.furnace;
    document.getElementById("generator").textContent = state.generator;
}

function update(){

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    player.x = Math.max(0,Math.min(MAP_W-1,player.x));
    player.y = Math.max(0,Math.min(MAP_H-1,player.y));
}

function mine(){

    const tx = Math.floor(player.x);
    const ty = Math.floor(player.y);

    const tile = map[ty][tx];

    if(tile === "iron"){

        state.iron += 1;
        map[ty][tx] = "grass";

    }

    if(tile === "coal"){

        state.coal += 1;
        map[ty][tx] = "grass";

    }

    updateUI();
}

function craftFurnace(){

    if(state.iron >= 5){

        state.iron -= 5;
        state.furnace += 1;

    }
    else{

        alert("鉄が足りません");

    }

    updateUI();
}

function craftGenerator(){

    if(state.iron >= 10 && state.furnace >= 1){

        state.iron -= 10;
        state.generator += 1;

    }
    else{

        alert("素材不足");

    }

    updateUI();
}

function useFurnace(){

    if(state.furnace <= 0){

        alert("かまどがありません");
        return;

    }

    if(state.coal <= 0){

        alert("石炭がありません");
        return;

    }

    state.coal -= 1;
    state.heat += 25;

    updateUI();
}

function generatePower(){

    if(state.generator <= 0){

        alert("発電機がありません");
        return;

    }

    if(state.heat >= 10){

        state.heat -= 10;
        state.power += 20;

    }
    else{

        alert("熱不足");

    }

    updateUI();
}

function research(){

    if(state.power >= 25){

        state.power -= 25;
        state.science += 1;

        if(state.science % 5 === 0){

            player.speed += 0.02;

        }

    }
    else{

        alert("電力不足");

    }

    updateUI();
}

window.addEventListener("keydown",(e)=>{

    const key = e.key.toLowerCase();

    if(e.code === "Space"){
        mine();
    }

    if(key === "c"){
        craftFurnace();
    }

    if(key === "g"){
        craftGenerator();
    }

    if(key === "b"){
        useFurnace();
    }

    if(key === "f"){
        generatePower();
    }

    if(key === "r"){
        research();
    }

});

function drawMap(){

    const camX = player.x * TILE - canvas.width / 2;
    const camY = player.y * TILE - canvas.height / 2;

    const startX = Math.floor(camX / TILE);
    const startY = Math.floor(camY / TILE);

    const endX = startX + Math.ceil(canvas.width / TILE) + 2;
    const endY = startY + Math.ceil(canvas.height / TILE) + 2;

    for(let y=startY;y<endY;y++){

        if(y < 0 || y >= MAP_H) continue;

        for(let x=startX;x<endX;x++){

            if(x < 0 || x >= MAP_W) continue;

            const tile = map[y][x];

            let color = "#22c55e";

            if(tile === "iron"){
                color = "#94a3b8";
            }

            if(tile === "coal"){
                color = "#111827";
            }

            ctx.fillStyle = color;

            ctx.fillRect(
                x * TILE - camX,
                y * TILE - camY,
                TILE - 1,
                TILE - 1
            );
        }
    }
}

function drawPlayer(){

    ctx.fillStyle = "#3b82f6";

    ctx.fillRect(
        canvas.width / 2 - 12,
        canvas.height / 2 - 12,
        24,
        24
    );
}

function drawMachines(){

    const x = 100;
    const y = 100;

    if(state.furnace > 0){

        ctx.fillStyle = "#ea580c";

        ctx.fillRect(x,y,60,60);

        ctx.fillStyle = "white";
        ctx.fillText("かまど",x,y-10);

    }

    if(state.generator > 0){

        ctx.fillStyle = "#eab308";

        ctx.fillRect(x+100,y,60,60);

        ctx.fillStyle = "white";
        ctx.fillText("発電機",x+100,y-10);

    }
}

function render(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawMap();
    drawPlayer();
    drawMachines();

}

function loop(){

    update();
    render();

    requestAnimationFrame(loop);
}

updateUI();
loop();

</script>

</body>
</html>
