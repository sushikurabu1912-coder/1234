<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumCraft</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#0f172a;
    font-family:sans-serif;
    color:white;
}

canvas{
    display:block;
    background:#1e293b;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:rgba(0,0,0,0.6);
    padding:12px;
    border-radius:10px;
    width:240px;
}

.bar{
    margin:5px 0;
}

.help{
    margin-top:10px;
    font-size:13px;
    color:#cbd5e1;
}

</style>
</head>
<body>

<div id="ui">
    <h2>QuantumCraft</h2>

    <div class="bar">⛏ 鉄: <span id="iron">0</span></div>
    <div class="bar">🔥 熱: <span id="heat">0</span></div>
    <div class="bar">⚡ 電力: <span id="power">0</span></div>
    <div class="bar">🧪 科学: <span id="science">0</span></div>

    <div class="help">
        WASD: 移動<br>
        SPACE: 採掘<br>
        E: 石炭燃焼<br>
        F: 発電<br>
        R: 研究
    </div>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const TILE = 32;
const MAP_W = 100;
const MAP_H = 100;

const map = [];

for(let y=0;y<MAP_H;y++){

    const row = [];

    for(let x=0;x<MAP_W;x++){

        let type = "grass";

        const r = Math.random();

        if(r < 0.08){
            type = "iron";
        }
        else if(r < 0.12){
            type = "coal";
        }

        row.push(type);
    }

    map.push(row);
}

const player = {
    x:10,
    y:10,
    speed:0.12
};

const state = {
    iron:0,
    heat:0,
    power:0,
    science:0
};

const keys = {};

window.addEventListener("keydown",(e)=>{
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup",(e)=>{
    keys[e.key.toLowerCase()] = false;
});

function updateUI(){

    document.getElementById("iron").textContent = state.iron;
    document.getElementById("heat").textContent = state.heat;
    document.getElementById("power").textContent = state.power;
    document.getElementById("science").textContent = state.science;
}

function update(){

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(MAP_W-1, player.x));
    player.y = Math.max(0, Math.min(MAP_H-1, player.y));
}

function mine(){

    const tx = Math.floor(player.x);
    const ty = Math.floor(player.y);

    const tile = map[ty][tx];

    if(tile === "iron"){
        state.iron += 1;
        map[ty][tx] = "grass";
    }

    if(tile === "coal"){
        state.heat += 10;
        map[ty][tx] = "grass";
    }

    updateUI();
}

function burnCoal(){

    if(state.iron >= 1){
        state.iron -= 1;
        state.heat += 20;
    }

    updateUI();
}

function generatePower(){

    if(state.heat >= 10){
        state.heat -= 10;
        state.power += 15;
    }

    updateUI();
}

function research(){

    if(state.power >= 20){

        state.power -= 20;
        state.science += 1;

        if(state.science % 5 === 0){
            player.speed += 0.02;
        }
    }

    updateUI();
}

window.addEventListener("keydown",(e)=>{

    if(e.code === "Space"){
        mine();
    }

    if(e.key.toLowerCase() === "e"){
        burnCoal();
    }

    if(e.key.toLowerCase() === "f"){
        generatePower();
    }

    if(e.key.toLowerCase() === "r"){
        research();
    }
});

function drawMap(){

    const camX = player.x * TILE - canvas.width/2;
    const camY = player.y * TILE - canvas.height/2;

    const startX = Math.floor(camX / TILE);
    const startY = Math.floor(camY / TILE);

    const endX = startX + Math.ceil(canvas.width / TILE) + 2;
    const endY = startY + Math.ceil(canvas.height / TILE) + 2;

    for(let y=startY;y<endY;y++){

        if(y < 0 || y >= MAP_H) continue;

        for(let x=startX;x<endX;x++){

            if(x < 0 || x >= MAP_W) continue;

            const tile = map[y][x];

            let color = "#22c55e";

            if(tile === "iron") color = "#94a3b8";
            if(tile === "coal") color = "#1e293b";

            ctx.fillStyle = color;

            ctx.fillRect(
                x*TILE - camX,
                y*TILE - camY,
                TILE-1,
                TILE-1
            );
        }
    }
}

function drawPlayer(){

    ctx.fillStyle = "#3b82f6";

    ctx.fillRect(
        canvas.width/2 - 12,
        canvas.height/2 - 12,
        24,
        24
    );
}

function drawScienceMachine(){

    const x = 200;
    const y = 200;

    ctx.fillStyle = "#475569";

    ctx.fillRect(x,y,80,80);

    ctx.fillStyle = "#facc15";

    ctx.beginPath();
    ctx.arc(x+40,y+40,25,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.fillText("発電機",x+10,y+105);
}

function render(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawMap();
    drawPlayer();
    drawScienceMachine();
}

function loop(){

    update();
    render();

    requestAnimationFrame(loop);
}

updateUI();
loop();

</script>
</body>
</html>
