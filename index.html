<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumCraft Inventory Update</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#0f172a;
    font-family:sans-serif;
    color:white;
}

canvas{
    display:block;
    background:#1e293b;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.65);
    padding:12px;
    border-radius:12px;
    width:320px;
    font-size:14px;
}

.bar{margin:4px 0;}

.hotbar{
    display:flex;
    gap:6px;
    margin-top:10px;
}

.slot{
    width:48px;
    height:48px;
    background:#334155;
    border:2px solid #475569;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    user-select:none;
}

.slot.active{
    border:2px solid #facc15;
}

.help{
    margin-top:10px;
    font-size:12px;
    color:#cbd5e1;
}
</style>
</head>
<body>

<div id="ui">
    <div>⛏ QuantumCraft Inventory</div>

    <div class="bar">鉄: <span id="iron">0</span></div>
    <div class="bar">石炭: <span id="coal">0</span></div>
    <div class="bar">熱: <span id="heat">0</span></div>
    <div class="bar">電力: <span id="power">0</span></div>
    <div class="bar">科学: <span id="science">0</span></div>

    <div class="bar">選択: <span id="selected">none</span></div>

    <div class="hotbar" id="hotbar"></div>

    <div class="help">
WASD 移動 / SPACE 採掘<br>
1-5 ホットバー選択<br>
F 発電 / R 研究
    </div>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

addEventListener("resize",()=>{
    canvas.width=innerWidth;
    canvas.height=innerHeight;
});

const TILE=32;
const MAP=60;

const map=[];

for(let y=0;y<MAP;y++){
    const row=[];
    for(let x=0;x<MAP;x++){
        const r=Math.random();
        row.push(
            r<0.08?"iron":
            r<0.15?"coal":
            "grass"
        );
    }
    map.push(row);
}

const player={x:10,y:10,speed:0.12};

const state={
    heat:0,
    power:0,
    science:0
};

const inv={
    iron:0,
    coal:0
};

let selected="iron";

const hotbar=["iron","coal","craft_furnace","craft_generator","use"];

const slots={};

function createHotbar(){

    const hb=document.getElementById("hotbar");

    hotbar.forEach((item,i)=>{

        const d=document.createElement("div");
        d.className="slot";
        d.textContent=i+1;

        d.onclick=()=>select(i);

        hb.appendChild(d);

        slots[i]=d;
    });

    updateHotbar();
}

function updateHotbar(){

    Object.values(slots).forEach(s=>s.classList.remove("active"));
    slots[hotbar.indexOf(selected)]?.classList.add("active");

    document.getElementById("selected").textContent=selected;
}

function select(i){
    selected=hotbar[i];
    updateHotbar();
}

const keys={};

addEventListener("keydown",(e)=>{
    keys[e.key.toLowerCase()]=true;

    if(e.key>="1"&&e.key<="5"){
        select(Number(e.key)-1);
    }

    if(e.code==="Space")mine();

    if(e.key==="f")generatePower();
    if(e.key==="r")research();
});

addEventListener("keyup",(e)=>{
    keys[e.key.toLowerCase()]=false;
});

function updateUI(){
    iron.textContent=inv.iron;
    coal.textContent=inv.coal;
    heat.textContent=state.heat;
    power.textContent=state.power;
    science.textContent=state.science;
}

function update(){

    if(keys.w)player.y-=player.speed;
    if(keys.s)player.y+=player.speed;
    if(keys.a)player.x-=player.speed;
    if(keys.d)player.x+=player.speed;

    player.x=Math.max(0,Math.min(MAP-1,player.x));
    player.y=Math.max(0,Math.min(MAP-1,player.y));
}

function mine(){

    const x=Math.floor(player.x);
    const y=Math.floor(player.y);

    const t=map[y][x];

    if(t==="iron"){
        inv.iron++;
        map[y][x]="grass";
    }

    if(t==="coal"){
        inv.coal++;
        map[y][x]="grass";
    }

    updateUI();
}

function craftFurnace(){

    if(inv.iron>=5){
        inv.iron-=5;
        state.furnace=(state.furnace||0)+1;
        return true;
    }
    return false;
}

function craftGenerator(){

    if(inv.iron>=10 && state.furnace>0){
        inv.iron-=10;
        state.generator=(state.generator||0)+1;
        return true;
    }
    return false;
}

function useItem(){

    if(selected==="craft_furnace")craftFurnace();
    if(selected==="craft_generator")craftGenerator();
    if(selected==="use")useCoal();
}

function useCoal(){

    if(inv.coal>0){
        inv.coal--;
        state.heat+=20;
    }
}

function generatePower(){

    if(state.generator>0 && state.heat>=10){
        state.heat-=10;
        state.power+=15;
    }
}

function research(){

    if(state.power>=20){
        state.power-=20;
        state.science++;
    }
}

addEventListener("keydown",(e)=>{

    if(e.key==="e"){
        useItem();
    }
});

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const camX=player.x*TILE-canvas.width/2;
    const camY=player.y*TILE-canvas.height/2;

    for(let y=0;y<MAP;y++){
        for(let x=0;x<MAP;x++){

            const t=map[y][x];

            let c="#22c55e";

            if(t==="iron")c="#94a3b8";
            if(t==="coal")c="#111827";

            ctx.fillStyle=c;

            ctx.fillRect(
                x*TILE-camX,
                y*TILE-camY,
                TILE-1,
                TILE-1
            );
        }
    }

    ctx.fillStyle="#3b82f6";
    ctx.fillRect(canvas.width/2-10,canvas.height/2-10,20,20);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

createHotbar();
updateUI();
loop();

</script>

</body>
</html>
