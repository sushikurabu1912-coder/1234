<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Explorer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

#gameContainer{
    width:min(100vw, calc(100vh * 16 / 9));
    aspect-ratio:16/9;
    position:relative;
    overflow:hidden;
    border:3px solid #333;
    background:black;
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:12px;
    border-radius:10px;
    z-index:10;
    line-height:1.7;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:28px;
    z-index:30;
    pointer-events:none;
}

/* 採掘バー */
#miningContainer{
    position:absolute;
    left:50%;
    top:calc(50% + 30px);
    transform:translateX(-50%);
    width:220px;
    height:20px;
    border:2px solid white;
    background:rgba(0,0,0,0.5);
    border-radius:999px;
    overflow:hidden;
    display:none;
    z-index:40;
}

#miningBar{
    width:0%;
    height:100%;
    background:#59ff71;
    transition:width 0.03s linear;
}

/* インベントリ */
#inventory{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:700px;
    max-width:92%;
    background:rgba(20,20,20,0.96);
    border:3px solid #666;
    border-radius:12px;
    padding:20px;
    display:none;
    z-index:100;
    color:white;
}

#inventory h2{
    text-align:center;
    margin-bottom:16px;
}

.inventory-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.slot{
    border:2px solid #666;
    border-radius:10px;
    background:#2b2b2b;
    min-height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
}
</style>
</head>

<body>

<div id="gameContainer">

    <div id="ui">
        W A S D = 移動<br>
        ← → ↑ ↓ = 視点移動<br>
        R長押し = 採掘<br>
        E = インベントリ
    </div>

    <div id="crosshair">+</div>

    <div id="miningContainer">
        <div id="miningBar"></div>
    </div>

    <div id="inventory">
        <h2>インベントリ</h2>

        <div class="inventory-grid">
            <div class="slot" id="stoneSlot"></div>
            <div class="slot" id="coalSlot"></div>
            <div class="slot" id="copperSlot"></div>
            <div class="slot" id="ironSlot"></div>
            <div class="slot" id="goldSlot"></div>
            <div class="slot" id="diamondSlot"></div>
            <div class="slot" id="scienceSlot"></div>
        </div>
    </div>

</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

const container = document.getElementById("gameContainer");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    container.clientWidth,
    container.clientHeight
);

container.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(
    75,
    container.clientWidth /
    container.clientHeight,
    0.1,
    1000
);

camera.position.set(0,2,5);

// 光
scene.add(
    new THREE.AmbientLight(
        0xffffff,
        0.8
    )
);

const sun =
new THREE.DirectionalLight(
    0xffffff,
    1
);

sun.position.set(10,20,10);
scene.add(sun);

// インベントリ
const inventory = {
    stone:0,
    coal:0,
    copper:0,
    iron:0,
    gold:0,
    diamond:0,
    science:0
};

function updateInventoryUI(){

    stoneSlot.textContent =
        `石 ×${inventory.stone}`;

    coalSlot.textContent =
        `石炭 ×${inventory.coal}`;

    copperSlot.textContent =
        `銅 ×${inventory.copper}`;

    ironSlot.textContent =
        `鉄 ×${inventory.iron}`;

    goldSlot.textContent =
        `金 ×${inventory.gold}`;

    diamondSlot.textContent =
        `ダイヤ ×${inventory.diamond}`;

    scienceSlot.textContent =
        `科学鉱石 ×${inventory.science}`;
}

const blockGeo =
new THREE.BoxGeometry(1,1,1);

const breakableObjects=[];

// 地面
for(let x=-20;x<=20;x++){
    for(let z=-20;z<=20;z++){

        const block =
        new THREE.Mesh(
            blockGeo,
            new THREE.MeshLambertMaterial({
                color:
                (x+z)%2===0
                ?0x4CAF50
                :0x3F9B45
            })
        );

        block.position.set(x,0,z);

        block.userData={
            type:"stone",
            mineTime:400
        };

        scene.add(block);
        breakableObjects.push(block);
    }
}

// 鉱石生成
function addOre(
    color,
    type,
    mineTime,
    amount=8
){
    for(let i=0;i<amount;i++){

        const ore =
        new THREE.Mesh(
            blockGeo,
            new THREE.MeshLambertMaterial({
                color
            })
        );

        ore.position.set(
            Math.random()*36-18,
            1,
            Math.random()*36-18
        );

        ore.userData={
            type,
            mineTime
        };

        scene.add(ore);
        breakableObjects.push(ore);
    }
}

addOre(0x333333,"coal",600);
addOre(0xb87333,"copper",1000);
addOre(0xc0c0c0,"iron",1800);
addOre(0xffd700,"gold",2200);
addOre(0x4de1ff,"diamond",3500);
addOre(0x00ffff,"science",4000);

// キー
const keys={};

window.addEventListener(
"keydown",
e=>{

    keys[e.key]=true;

    if(
        e.key==="e"||
        e.key==="E"
    ){
        const inv =
        document.getElementById(
            "inventory"
        );

        inv.style.display=
        inv.style.display==="block"
        ?"none"
        :"block";
    }
});

window.addEventListener(
"keyup",
e=>{
    keys[e.key]=false;
});

// 視点
let yaw=0;
let pitch=0;

function updateCameraRotation(){

    const speed=0.02;

    if(keys["ArrowLeft"])
        yaw+=speed;

    if(keys["ArrowRight"])
        yaw-=speed;

    if(keys["ArrowUp"])
        pitch+=speed;

    if(keys["ArrowDown"])
        pitch-=speed;

    pitch=Math.max(
        -1.4,
        Math.min(1.4,pitch)
    );

    camera.rotation.order=
    "YXZ";

    camera.rotation.y=yaw;
    camera.rotation.x=pitch;
}

// 移動
function movePlayer(){

    const speed=0.12;

    const forward=
    new THREE.Vector3(
        Math.sin(yaw),
        0,
        Math.cos(yaw)
    );

    const right=
    new THREE.Vector3(
        Math.cos(yaw),
        0,
        -Math.sin(yaw)
    );

    if(keys["w"]||
       keys["W"]){
        camera.position
        .addScaledVector(
            forward,
            -speed
        );
    }

    if(keys["s"]||
       keys["S"]){
        camera.position
        .addScaledVector(
            forward,
            speed
        );
    }

    if(keys["a"]||
       keys["A"]){
        camera.position
        .addScaledVector(
            right,
            -speed
        );
    }

    if(keys["d"]||
       keys["D"]){
        camera.position
        .addScaledVector(
            right,
            speed
        );
    }

    camera.position.y=2;
}

// 採掘
const raycaster =
new THREE.Raycaster();

const miningBar =
document.getElementById(
    "miningBar"
);

const miningContainer=
document.getElementById(
    "miningContainer"
);

let mining=false;
let miningTarget=null;
let miningStart=0;

function handleMining(){

    if(
        !keys["r"] &&
        !keys["R"]
    ){
        mining=false;
        miningTarget=null;
        miningBar.style.width="0%";
        miningContainer.style.display=
        "none";
        return;
    }

    raycaster.setFromCamera(
        new THREE.Vector2(0,0),
        camera
    );

    const hit=
    raycaster.intersectObjects(
        breakableObjects
    );

    if(hit.length===0)
        return;

    const target=
    hit[0].object;

    if(hit[0].distance>6)
        return;

    if(
        !mining||
        miningTarget!==target
    ){
        mining=true;
        miningTarget=target;
        miningStart=
        performance.now();

        miningContainer.style.display=
        "block";
    }

    const elapsed=
        performance.now()
        -miningStart;

    const progress=
        elapsed/
        target.userData.mineTime;

    miningBar.style.width=
        `${Math.min(
            progress*100,
            100
        )}%`;

    if(progress>=1){

        inventory[
            target.userData.type
        ]++;

        updateInventoryUI();

        scene.remove(target);

        const index=
        breakableObjects
        .indexOf(target);

        if(index!==-1){
            breakableObjects.splice(
                index,
                1
            );
        }

        mining=false;
        miningTarget=null;
        miningBar.style.width=
        "0%";

        miningContainer.style.display=
        "none";
    }
}

// リサイズ
window.addEventListener(
"resize",
()=>{
    renderer.setSize(
        container.clientWidth,
        container.clientHeight
    );

    camera.aspect=
    container.clientWidth/
    container.clientHeight;

    camera.updateProjectionMatrix();
});

// ループ
function animate(){

    requestAnimationFrame(
        animate
    );

    updateCameraRotation();
    movePlayer();
    handleMining();

    renderer.render(
        scene,
        camera
    );
}

updateInventoryUI();
animate();
</script>

</body>
</html>
